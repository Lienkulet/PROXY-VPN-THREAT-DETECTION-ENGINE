<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IP Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #060810;
      --panel: #0b0f1a;
      --border: #1a2236;
      --accent: #00ffe0;
      --accent2: #ff4d6d;
      --accent3: #7b61ff;
      --text: #c8d8f0;
      --muted: #4a5a7a;
      --success: #00ffe0;
      --danger: #ff4d6d;
      --warn: #ffb347;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Rajdhani', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,224,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,224,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow orbs */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,255,224,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      border: 2px solid var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 16px rgba(0,255,224,0.3);
      animation: pulse-border 3s ease-in-out infinite;
    }

    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 16px rgba(0,255,224,0.3); }
      50% { box-shadow: 0 0 28px rgba(0,255,224,0.6); }
    }

    .logo-icon svg { color: var(--accent); }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      margin-top: 4px;
    }

    /* Search panel */
    .search-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }

    .search-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .input-row {
      display: flex;
      gap: 12px;
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 14px 14px 42px;
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 0.05em;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,255,224,0.1);
    }

    input[type="text"]::placeholder { color: var(--muted); }

    button.scan-btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 14px 28px;
      font-family: var(--sans);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      position: relative;
      overflow: hidden;
    }

    button.scan-btn:hover {
      background: #fff;
      box-shadow: 0 0 20px rgba(0,255,224,0.4);
      transform: translateY(-1px);
    }

    button.scan-btn:active { transform: translateY(0); }

    button.scan-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Quick IPs */
    .quick-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .quick-label {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .quick-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 10px;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .quick-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Loading */
    .loading {
      display: none;
      text-align: center;
      padding: 40px;
    }

    .loading.active { display: block; }

    .scan-animation {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      position: relative;
    }

    .scan-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--accent);
      animation: spin 1s linear infinite;
    }

    .scan-ring:nth-child(2) {
      inset: 10px;
      border-top-color: var(--accent3);
      animation-duration: 0.7s;
      animation-direction: reverse;
    }

    .scan-ring:nth-child(3) {
      inset: 20px;
      border-top-color: var(--accent2);
      animation-duration: 1.4s;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--accent);
      letter-spacing: 0.2em;
      animation: blink 1s ease-in-out infinite;
    }

    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* Results */
    .results { display: none; }
    .results.active { display: block; animation: fadeIn 0.4s ease; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    /* Score card */
    .score-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .score-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }

    .score-card.safe::before { background: linear-gradient(90deg, transparent, var(--success), transparent); }
    .score-card.warn::before { background: linear-gradient(90deg, transparent, var(--warn), transparent); }
    .score-card.danger::before { background: linear-gradient(90deg, transparent, var(--danger), transparent); }

    .score-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
    }

    .queried-ip {
      font-family: var(--mono);
      font-size: 1.6rem;
      font-weight: 400;
      color: #fff;
      letter-spacing: 0.05em;
    }

    .risk-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .risk-badge.safe { background: rgba(0,255,224,0.1); border: 1px solid var(--success); color: var(--success); }
    .risk-badge.warn { background: rgba(255,179,71,0.1); border: 1px solid var(--warn); color: var(--warn); }
    .risk-badge.danger { background: rgba(255,77,109,0.1); border: 1px solid var(--danger); color: var(--danger); }

    .risk-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      animation: pulse-dot 1.5s ease-in-out infinite;
    }

    .safe .risk-dot { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .warn .risk-dot { background: var(--warn); box-shadow: 0 0 6px var(--warn); }
    .danger .risk-dot { background: var(--danger); box-shadow: 0 0 6px var(--danger); }

    @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Score bar */
    .score-bar-wrap {
      margin-bottom: 8px;
    }

    .score-bar-labels {
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .score-bar-track {
      height: 8px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 1s cubic-bezier(0.4,0,0.2,1);
      position: relative;
    }

    .score-bar-fill::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 20px; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
    }

    .score-bar-fill.safe { background: linear-gradient(90deg, #00c9a7, var(--success)); }
    .score-bar-fill.warn { background: linear-gradient(90deg, #f0a500, var(--warn)); }
    .score-bar-fill.danger { background: linear-gradient(90deg, #c0003c, var(--danger)); }

    .score-value {
      text-align: right;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text);
      margin-top: 4px;
    }

    /* Info grid */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .info-cell {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      transition: border-color 0.2s;
    }

    .info-cell:hover { border-color: var(--accent); }

    .info-cell-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .info-cell-value {
      font-family: var(--mono);
      font-size: 1rem;
      color: #fff;
      word-break: break-all;
    }

    .info-cell-value.accent { color: var(--accent); }
    .info-cell-value.danger { color: var(--danger); }
    .info-cell-value.warn { color: var(--warn); }

    /* Raw JSON toggle */
    .raw-toggle {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      width: 100%;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s;
      letter-spacing: 0.1em;
    }

    .raw-toggle:hover { border-color: var(--accent3); color: var(--accent3); }

    .raw-json {
      display: none;
      background: var(--bg);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 8px 8px;
      padding: 16px;
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--accent);
      white-space: pre-wrap;
      overflow-x: auto;
      line-height: 1.6;
    }

    .raw-json.open { display: block; }

    /* Error panel */
    .error-panel {
      display: none;
      background: rgba(255,77,109,0.08);
      border: 1px solid rgba(255,77,109,0.3);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
    }

    .error-panel.active { display: block; animation: fadeIn 0.3s ease; }

    .error-code {
      font-family: var(--mono);
      font-size: 2rem;
      color: var(--danger);
      margin-bottom: 8px;
    }

    .error-msg {
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 4px;
    }

    .error-hint {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 48px;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    footer a { color: var(--accent3); text-decoration: none; }

    @media (max-width: 520px) {
      .input-row { flex-direction: column; }
      .score-header { flex-direction: column; gap: 12px; }
      h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-line">
      <div class="logo-icon">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
        </svg>
      </div>
      <h1>IP <span>INTEL</span></h1>
    </div>
    <div class="subtitle">// PROXY · VPN · THREAT DETECTION ENGINE</div>
  </header>

  <div class="search-panel">
    <div class="input-row">
      <div class="input-wrap">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="ipInput" placeholder="Enter IPv4 address (e.g. 8.8.8.8)" autocomplete="off" spellcheck="false"/>
      </div>
      <button class="scan-btn" id="scanBtn" onclick="scan()">SCAN</button>
    </div>
    <div class="quick-row">
      <span class="quick-label">QUICK TEST:</span>
      <button class="quick-btn" onclick="quickScan('8.8.8.8')">8.8.8.8</button>
      <button class="quick-btn" onclick="quickScan('1.1.1.1')">1.1.1.1</button>
      <button class="quick-btn" onclick="quickScan('46.55.103.43')">46.55.103.43</button>
      <button class="quick-btn" onclick="quickScan('104.18.0.0')">104.18.0.0</button>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="scan-animation">
      <div class="scan-ring"></div>
      <div class="scan-ring"></div>
      <div class="scan-ring"></div>
    </div>
    <div class="loading-text">SCANNING TARGET...</div>
  </div>

  <!-- Error -->
  <div class="error-panel" id="errorPanel">
    <div class="error-code" id="errorCode">ERROR</div>
    <div class="error-msg" id="errorMsg">Something went wrong</div>
    <div class="error-hint" id="errorHint"></div>
  </div>

  <!-- Results -->
  <div class="results" id="results">

    <div class="score-card" id="scoreCard">
      <div class="score-header">
        <div>
          <div style="font-family:var(--mono);font-size:0.65rem;color:var(--muted);letter-spacing:0.2em;margin-bottom:4px">TARGET IP</div>
          <div class="queried-ip" id="resultIP">—</div>
        </div>
        <div class="risk-badge" id="riskBadge">
          <div class="risk-dot"></div>
          <span id="riskLabel">—</span>
        </div>
      </div>

      <div class="score-bar-wrap">
        <div class="score-bar-labels">
          <span>PROXY/VPN PROBABILITY</span>
          <span id="scorePercent">—</span>
        </div>
        <div class="score-bar-track">
          <div class="score-bar-fill" id="scoreBar" style="width:0%"></div>
        </div>
        <div class="score-value" id="scoreRaw">—</div>
      </div>
    </div>

    <div class="info-grid" id="infoGrid"></div>

    <button class="raw-toggle" id="rawToggle" onclick="toggleRaw()">
      <span>// RAW JSON RESPONSE</span>
      <span id="toggleArrow">▼</span>
    </button>
    <pre class="raw-json" id="rawJson"></pre>

  </div>

  <footer>
    POWERED BY <a href="https://getipintel.net" target="_blank">GETIPINTEL.NET</a> &nbsp;·&nbsp;
    PROXY: <a href="http://localhost:8080" target="_blank">LOCALHOST:8080</a>
  </footer>

</div>

<script>
  const PROXY = 'http://localhost:8080';

  const errorMessages = {
    '-1': ['INVALID INPUT', 'No IP address was provided'],
    '-2': ['INVALID IP', 'The IP address format is incorrect'],
    '-3': ['PRIVATE ADDRESS', 'This is a private/unroutable IP address'],
    '-4': ['DATABASE ERROR', 'GetIPIntel database is currently unavailable'],
    '-5': ['ACCESS DENIED', 'Your IP is banned or rate limited — try a mobile hotspot'],
    '-6': ['NO CONTACT', 'Missing or invalid contact email in proxy config'],
  };

  function quickScan(ip) {
    document.getElementById('ipInput').value = ip;
    scan();
  }

  async function scan() {
    const ip = document.getElementById('ipInput').value.trim();
    if (!ip) {
      document.getElementById('ipInput').focus();
      return;
    }

    // Reset UI
    document.getElementById('results').classList.remove('active');
    document.getElementById('errorPanel').classList.remove('active');
    document.getElementById('loading').classList.add('active');
    document.getElementById('scanBtn').disabled = true;
    document.getElementById('rawJson').classList.remove('open');
    document.getElementById('toggleArrow').textContent = '▼';

    try {
      const res = await fetch(`${PROXY}/?ip=${encodeURIComponent(ip)}`);
      const data = await res.json();

      document.getElementById('loading').classList.remove('active');
      document.getElementById('scanBtn').disabled = false;

      if (data.status === 'error') {
        showError(data.result, data.message);
        return;
      }

      showResults(data);

    } catch (err) {
      document.getElementById('loading').classList.remove('active');
      document.getElementById('scanBtn').disabled = false;
      showError('CONN', 'Could not connect to proxy server. Is proxy.js running on port 8080?');
    }
  }

  function showError(code, message) {
    const info = errorMessages[code] || [code, message];
    document.getElementById('errorCode').textContent = info[0];
    document.getElementById('errorMsg').textContent = info[1] || message;
    document.getElementById('errorHint').textContent =
      code === '-5' ? 'Run: node proxy.js  |  Then try from your home network' :
      code === 'CONN' ? 'Start the proxy: node proxy.js' : '';
    document.getElementById('errorPanel').classList.add('active');
  }

  function showResults(data) {
    const score = parseFloat(data.result);
    const ip = data.queryIP;

    // Determine risk level
    let risk, riskClass;
    if (score === 1) { risk = 'EXPLICITLY BANNED'; riskClass = 'danger'; }
    else if (score >= 0.99) { risk = 'HIGH RISK'; riskClass = 'danger'; }
    else if (score >= 0.90) { risk = 'SUSPICIOUS'; riskClass = 'warn'; }
    else { risk = 'LOW RISK'; riskClass = 'safe'; }

    // Score card
    document.getElementById('scoreCard').className = `score-card ${riskClass}`;
    document.getElementById('resultIP').textContent = ip;

    const badge = document.getElementById('riskBadge');
    badge.className = `risk-badge ${riskClass}`;
    document.getElementById('riskLabel').textContent = risk;

    document.getElementById('scorePercent').textContent = (score * 100).toFixed(2) + '%';
    document.getElementById('scoreRaw').textContent = `RAW SCORE: ${score}`;

    setTimeout(() => {
      const bar = document.getElementById('scoreBar');
      bar.style.width = (score * 100) + '%';
      bar.className = `score-bar-fill ${riskClass}`;
    }, 50);

    // Info cells
    const cells = [];

    if (data.Country) {
      cells.push({ label: 'COUNTRY', value: data.Country || '—', cls: '' });
    }
    if (data.ASN) {
      cells.push({ label: 'ASN', value: data.ASN, cls: 'accent' });
    }
    if (data.BadIP !== undefined) {
      cells.push({
        label: 'BAD IP',
        value: data.BadIP === '1' ? '⚠ YES' : '✓ NO',
        cls: data.BadIP === '1' ? 'danger' : 'accent'
      });
    }
    cells.push({ label: 'FLAGS', value: data.queryFlags || 'none', cls: '' });
    cells.push({ label: 'OFLAGS', value: data.queryOFlags || 'none', cls: '' });
    cells.push({ label: 'STATUS', value: data.status.toUpperCase(), cls: 'accent' });

    const grid = document.getElementById('infoGrid');
    grid.innerHTML = cells.map(c => `
      <div class="info-cell">
        <div class="info-cell-label">${c.label}</div>
        <div class="info-cell-value ${c.cls}">${c.value}</div>
      </div>
    `).join('');

    // Raw JSON
    document.getElementById('rawJson').textContent = JSON.stringify(data, null, 2);

    document.getElementById('results').classList.add('active');
  }

  function toggleRaw() {
    const raw = document.getElementById('rawJson');
    const arrow = document.getElementById('toggleArrow');
    raw.classList.toggle('open');
    arrow.textContent = raw.classList.contains('open') ? '▲' : '▼';
  }

  // Enter key
  document.getElementById('ipInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') scan();
  });
</script>
</body>
</html>
